          type: string
          maxLength: 128
      - in: query
        name: actor_id
        schema:
          type: string
          maxLength: 128
      - in: query
        name: actor_type
        schema:
          type: string
          maxLength: 64
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 250
          minimum: 1
          default: 100
      - in: query
        name: occurred_from
        schema:
          type: string
          format: date-time
      - in: query
        name: occurred_to
        schema:
          type: string
          format: date-time
      - in: query
        name: target_id
        schema:
          type: string
          maxLength: 128
      - in: query
        name: target_type
        schema:
          type: string
          maxLength: 128
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEvent'
          description: ''
  /api/v1/admin-ops/tasks/:
    get:
      operationId: v1_admin_ops_tasks_list
      parameters:
      - in: query
        name: assigned_admin_id
        schema:
          type: string
          format: uuid
      - in: query
        name: due_after
        schema:
          type: string
          format: date-time
      - in: query
        name: due_before
        schema:
          type: string
          format: date-time
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 250
          minimum: 1
          default: 100
      - in: query
        name: priority
        schema:
          enum:
          - low
          - normal
          - high
          - urgent
          type: string
          minLength: 1
        description: |-
          * `low` - Low
          * `normal` - Normal
          * `high` - High
          * `urgent` - Urgent
      - in: query
        name: related_object_id
        schema:
          type: string
          maxLength: 128
      - in: query
        name: related_object_type
        schema:
          type: string
          maxLength: 128
      - in: query
        name: status
        schema:
          enum:
          - open
          - in_progress
          - waiting
          - resolved
          - cancelled
          type: string
          minLength: 1
        description: |-
          * `open` - Open
          * `in_progress` - In progress
          * `waiting` - Waiting
          * `resolved` - Resolved
          * `cancelled` - Cancelled
      - in: query
        name: task_type
        schema:
          enum:
          - kyc_manual_review
          - account_access_review
          - borrower_onboarding
          - loan_setup
          - payment_reconciliation
          - fx_settlement
          - document_review
          - email_delivery_failure
          - reporting
          - support
          - other
          type: string
          minLength: 1
        description: |-
          * `kyc_manual_review` - KYC manual review
          * `account_access_review` - Account access review
          * `borrower_onboarding` - Borrower onboarding
          * `loan_setup` - Loan setup
          * `payment_reconciliation` - Payment reconciliation
          * `fx_settlement` - FX settlement
          * `document_review` - Document review
          * `email_delivery_failure` - Email delivery failure
          * `reporting` - Reporting
          * `support` - Support
          * `other` - Other
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminTask'
          description: ''
    post:
      operationId: v1_admin_ops_tasks_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTaskCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminTaskCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminTaskCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTask'
          description: ''
