openapi: 3.0.3
info:
  title: BANXUM API
  version: 0.1.0
  description: Internal API for BANXUM investor and admin portals.
paths:
  /api/v1/auth/admin/login/confirm/:
    post:
      operationId: v1_auth_admin_login_confirm_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminLoginConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminLoginConfirmRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/admin/login/start/:
    post:
      operationId: v1_auth_admin_login_start_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginStartRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminLoginStartRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminLoginStartRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginStartResponse'
          description: ''
  /api/v1/auth/admin/users/:
    post:
      operationId: v1_auth_admin_users_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/admin/users/{user_id}/access/:
    post:
      operationId: v1_auth_admin_users_access_create
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountAccessChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountAccessChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountAccessChangeRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAccessChangeResponse'
          description: ''
  /api/v1/auth/magic-link/consume/:
    post:
      operationId: v1_auth_magic_link_consume_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/magic-link/request/:
    post:
      operationId: v1_auth_magic_link_request_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
        required: true
      responses:
        '202':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/phone/confirm/:
    post:
      operationId: v1_auth_phone_confirm_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationConfirmResponse'
          description: ''
  /api/v1/auth/phone/request/:
    post:
      operationId: v1_auth_phone_request_create
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationRequestResponse'
          description: ''
  /api/v1/auth/register/natural-person/:
    post:
      operationId: v1_auth_register_natural_person_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NaturalPersonRegistrationResponse'
          description: ''
  /api/v1/health/:
    get:
      operationId: v1_health_retrieve
      tags:
      - v1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: ''
  /api/v1/kyc/admin/cases/{case_id}/manual-review/:
    post:
      operationId: v1_kyc_admin_cases_manual_review_create
      parameters:
      - in: path
        name: case_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycManualReviewDecisionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/KycManualReviewDecisionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/KycManualReviewDecisionRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycManualReviewDecisionResponse'
          description: ''
  /api/v1/kyc/admin/manual-reviews/:
    get:
      operationId: v1_kyc_admin_manual_reviews_list
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KycAdminCase'
          description: ''
  /api/v1/kyc/session/:
    post:
      operationId: v1_kyc_session_create
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycSessionResponse'
          description: ''
  /api/v1/kyc/status/:
    get:
      operationId: v1_kyc_status_retrieve
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycStatusResponse'
          description: ''
  /api/v1/kyc/webhooks/didit/:
    post:
      operationId: v1_kyc_webhooks_didit_create
      tags:
      - v1
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiditWebhookResponse'
          description: ''
components:
  schemas:
    AccountAccessChangeRequest:
      type: object
      properties:
        new_status:
          $ref: '#/components/schemas/NewStatusEnum'
        reason_code:
          $ref: '#/components/schemas/AccountAccessChangeRequestReasonCodeEnum'
        note:
          type: string
        evidence_summary:
          type: string
        clean_account_confirmed:
          type: boolean
          default: false
      required:
      - new_status
      - reason_code
    AccountAccessChangeRequestReasonCodeEnum:
      enum:
      - kyc_aml_review
      - compliance_hold
      - email_recovery
      - support_request
      - account_closure
      - admin_correction
      - other
      type: string
      description: |-
        * `kyc_aml_review` - KYC/AML review
        * `compliance_hold` - Compliance hold
        * `email_recovery` - Email recovery
        * `support_request` - Support request
        * `account_closure` - Account closure
        * `admin_correction` - Admin correction
        * `other` - Other
    AccountAccessChangeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        event:
          $ref: '#/components/schemas/AccountAccessEvent'
      required:
      - event
      - user
    AccountAccessEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        actor_account_type:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        previous_is_active:
          type: boolean
        new_is_active:
          type: boolean
        reason_code:
          type: string
        note:
          type: string
        evidence_summary:
          type: string
        clean_account_confirmed:
          type: boolean
        changed_at:
          type: string
          format: date-time
      required:
      - actor_account_type
      - actor_user_id
      - changed_at
      - clean_account_confirmed
      - evidence_summary
      - id
      - new_is_active
      - new_status
      - note
      - previous_is_active
      - previous_status
      - reason_code
      - user_id
    AdminLoginConfirmRequest:
      type: object
      properties:
        code_id:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^\d{6}$
      required:
      - code
      - code_id
    AdminLoginStartRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    AdminLoginStartResponse:
      type: object
      properties:
        code_id:
          type: string
          format: uuid
        status:
          type: string
        expires_at:
          type: string
          format: date-time
      required:
      - code_id
      - expires_at
      - status
    AdminUserCreateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 1
        full_name:
          type: string
          maxLength: 255
      required:
      - email
      - full_name
      - password
    AuthenticatedUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
      required:
      - user
    DecisionEnum:
      enum:
      - approve
      - decline
      - request_reverification
      - reopen
      type: string
      description: |-
        * `approve` - Approve
        * `decline` - Decline
        * `request_reverification` - Request re-verification
        * `reopen` - Reopen manual review
    DiditWebhookResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
        idempotent:
          type: boolean
      required:
      - idempotent
      - status
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        platform:
          type: string
        operator:
          type: string
        timezone:
          type: string
        environment:
          type: string
      required:
      - environment
      - operator
      - platform
      - status
      - timezone
    KycAdminCase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject_type:
          type: string
        subject_reference:
          type: string
        user_id:
          type: string
          format: uuid
          nullable: true
        provider:
          type: string
        provider_environment:
          type: string
        workflow_id:
          type: string
        status:
          type: string
        manual_review_required:
          type: boolean
        blocking_reason:
          type: string
        risk_classification:
          type: string
        detected_flags:
          type: array
          items:
            type: string
        provider_session_id:
          type: string
        provider_verification_id:
          type: string
        provider_report_id:
          type: string
        aml_screening_id:
          type: string
        provider_subject_id:
          type: string
        decision_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - aml_screening_id
      - blocking_reason
      - created_at
      - decision_at
      - detected_flags
      - id
      - manual_review_required
      - provider
      - provider_environment
      - provider_report_id
      - provider_session_id
      - provider_subject_id
      - provider_verification_id
      - risk_classification
      - status
      - subject_reference
      - subject_type
      - updated_at
      - user_id
      - workflow_id
    KycManualReviewDecision:
      type: object
      properties:
        id:
          type: string
          format: uuid
        case_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        actor_account_type:
          type: string
        decision:
          type: string
        reason_code:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        note:
          type: string
        evidence_summary:
          type: string
        decided_at:
          type: string
          format: date-time
      required:
      - actor_account_type
      - actor_user_id
      - case_id
      - decided_at
      - decision
      - evidence_summary
      - id
      - new_status
      - note
      - previous_status
      - reason_code
    KycManualReviewDecisionRequest:
      type: object
      properties:
        decision:
          $ref: '#/components/schemas/DecisionEnum'
        reason_code:
          $ref: '#/components/schemas/KycManualReviewDecisionRequestReasonCodeEnum'
        note:
          type: string
        evidence_summary:
          type: string
      required:
      - decision
      - reason_code
    KycManualReviewDecisionRequestReasonCodeEnum:
      enum:
      - pep_review
      - high_risk_review
      - adverse_media_review
      - sanctions_review
      - provider_decline_review
      - inconclusive_provider_result
      - document_or_identity_issue
      - reverification_required
      - off_platform_review
      - admin_correction
      - other
      type: string
      description: |-
        * `pep_review` - PEP review
        * `high_risk_review` - High-risk review
        * `adverse_media_review` - Adverse-media review
        * `sanctions_review` - Sanctions review
        * `provider_decline_review` - Provider decline review
        * `inconclusive_provider_result` - Inconclusive provider result
        * `document_or_identity_issue` - Document or identity issue
        * `reverification_required` - Re-verification required
        * `off_platform_review` - Off-platform review
        * `admin_correction` - Admin correction
        * `other` - Other
    KycManualReviewDecisionResponse:
      type: object
      properties:
        case:
          $ref: '#/components/schemas/KycAdminCase'
        decision:
          $ref: '#/components/schemas/KycManualReviewDecision'
      required:
      - case
      - decision
    KycSessionResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
        provider_session_id:
          type: string
          nullable: true
        verification_url:
          type: string
          format: uri
          nullable: true
        already_approved:
          type: boolean
      required:
      - already_approved
      - provider_session_id
      - status
      - verification_url
    KycStatusResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/StatusEnum'
        financial_access_allowed:
          type: boolean
        phone_verified:
          type: boolean
        provider:
          type: string
        provider_session_id:
          type: string
        verification_url:
          type: string
          format: uri
          nullable: true
        manual_review_required:
          type: boolean
        detected_flags:
          type: array
          items:
            type: string
        risk_classification:
          type: string
      required:
      - detected_flags
      - financial_access_allowed
      - manual_review_required
      - phone_verified
      - provider
      - provider_session_id
      - risk_classification
      - status
      - verification_url
    MagicLinkConsume:
      type: object
      properties:
        token:
          type: string
      required:
      - token
    MagicLinkRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    NaturalPersonRegistrationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
          maxLength: 255
        phone_number:
          type: string
          maxLength: 32
        terms_version:
          type: string
          maxLength: 64
        terms_hash:
          type: string
          maxLength: 128
        marketing_consent:
          type: boolean
          default: false
      required:
      - email
      - full_name
      - phone_number
      - terms_hash
      - terms_version
    NaturalPersonRegistrationResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
      required:
      - user
    NewStatusEnum:
      enum:
      - active
      - restricted
      - locked
      - closed
      type: string
      description: |-
        * `active` - active
        * `restricted` - restricted
        * `locked` - locked
        * `closed` - closed
    PhoneVerificationConfirmRequest:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^\d{6}$
      required:
      - challenge_id
      - code
    PhoneVerificationConfirmResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
      required:
      - user
    PhoneVerificationRequestResponse:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        phone_verified:
          type: boolean
      required:
      - challenge_id
      - expires_at
      - phone_verified
      - status
    StatusEnum:
      enum:
      - not_started
      - pending
      - approved
      - declined
      - manual_review
      - high_risk
      - sanctions_hit
      - pep_hit
      - adverse_media_hit
      - expired
      - reverification_required
      type: string
      description: |-
        * `not_started` - Not started
        * `pending` - Pending
        * `approved` - Approved
        * `declined` - Declined
        * `manual_review` - Manual review
        * `high_risk` - High risk
        * `sanctions_hit` - Sanctions hit
        * `pep_hit` - PEP hit
        * `adverse_media_hit` - Adverse media hit
        * `expired` - Expired
        * `reverification_required` - Re-verification required
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        account_type:
          type: string
        status:
          type: string
        phone_verified:
          type: boolean
        marketing_consent:
          type: boolean
      required:
      - account_type
      - email
      - full_name
      - id
      - marketing_consent
      - phone_verified
      - status
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
