  /api/v1/health/:
    get:
      operationId: v1_health_retrieve
      tags:
      - v1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: ''
  /api/v1/kyc/admin/cases/{case_id}/manual-review/:
    post:
      operationId: v1_kyc_admin_cases_manual_review_create
      parameters:
      - in: path
        name: case_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KycManualReviewDecisionRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/KycManualReviewDecisionRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/KycManualReviewDecisionRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycManualReviewDecisionResponse'
