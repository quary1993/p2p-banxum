  /api/v1/kyc/admin/manual-reviews/:
    get:
      operationId: v1_kyc_admin_manual_reviews_list
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KycAdminCase'
          description: ''
  /api/v1/kyc/session/:
    post:
      operationId: v1_kyc_session_create
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycSessionResponse'
          description: ''
  /api/v1/kyc/status/:
    get:
      operationId: v1_kyc_status_retrieve
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KycStatusResponse'
          description: ''
  /api/v1/kyc/webhooks/didit/:
    post:
      operationId: v1_kyc_webhooks_didit_create
      tags:
      - v1
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiditWebhookResponse'
          description: ''
components:
  schemas:
    AccountAccessChangeRequest:
      type: object
      properties:
        new_status:
          $ref: '#/components/schemas/NewStatusEnum'
        reason_code:
          $ref: '#/components/schemas/AccountAccessChangeRequestReasonCodeEnum'
        note:
          type: string
        evidence_summary:
          type: string
        clean_account_confirmed:
          type: boolean
          default: false
      required:
      - new_status
      - reason_code
    AccountAccessChangeRequestReasonCodeEnum:
      enum:
      - kyc_aml_review
      - compliance_hold
      - email_recovery
      - support_request
      - account_closure
      - admin_correction
      - other
      type: string
      description: |-
        * `kyc_aml_review` - KYC/AML review
        * `compliance_hold` - Compliance hold
        * `email_recovery` - Email recovery
        * `support_request` - Support request
        * `account_closure` - Account closure
        * `admin_correction` - Admin correction
        * `other` - Other
    AccountAccessChangeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        event:
          $ref: '#/components/schemas/AccountAccessEvent'
      required:
      - event
      - user
    AccountAccessEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        actor_account_type:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        previous_is_active:
          type: boolean
        new_is_active:
          type: boolean
        reason_code:
          type: string
        note:
          type: string
        evidence_summary:
          type: string
        clean_account_confirmed:
          type: boolean
        changed_at:
          type: string
          format: date-time
      required:
      - actor_account_type
      - actor_user_id
      - changed_at
      - clean_account_confirmed
      - evidence_summary
      - id
      - new_is_active
      - new_status
      - note
      - previous_is_active
      - previous_status
      - reason_code
      - user_id
    AdminLoginConfirmRequest:
      type: object
      properties:
        code_id:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^\d{6}$
      required:
      - code
      - code_id
    AdminLoginStartRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    AdminLoginStartResponse:
      type: object
      properties:
        code_id:
          type: string
          format: uuid
        status:
          type: string
        expires_at:
          type: string
          format: date-time
      required:
      - code_id
      - expires_at
      - status
    AdminTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_type:
          type: string
        title:
          type: string
        priority:
          type: string
        status:
          type: string
        assigned_admin_id:
          type: string
          format: uuid
          nullable: true
        created_by_id:
          type: string
          format: uuid
        due_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
        related_object_type:
          type: string
        related_object_id:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        completion_note:
          type: string
        is_terminal:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - assigned_admin_id
      - completed_at
      - completion_note
      - created_at
      - created_by_id
      - due_at
      - id
      - is_terminal
      - notes
      - priority
      - related_object_id
      - related_object_type
      - status
      - task_type
      - title
      - updated_at
    AdminTaskCreateRequest:
      type: object
      properties:
        task_type:
          $ref: '#/components/schemas/AdminTaskTypeEnum'
        title:
          type: string
          maxLength: 255
        priority:
          allOf:
          - $ref: '#/components/schemas/AdminTaskPriorityEnum'
          default: normal
        assigned_admin_id:
          type: string
          format: uuid
          nullable: true
        due_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
        related_object_type:
          type: string
          maxLength: 128
        related_object_id:
          type: string
          maxLength: 128
      required:
      - task_type
      - title
    AdminTaskEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
        event_type:
          type: string
        actor_user_id:
          type: string
          format: uuid
        actor_account_type:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        note:
          type: string
        metadata: {}
        occurred_at:
          type: string
          format: date-time
      required:
      - actor_account_type
      - actor_user_id
      - event_type
      - id
      - metadata
      - new_status
      - note
      - occurred_at
      - previous_status
      - task_id
    AdminTaskPriorityEnum:
      enum:
      - low
      - normal
      - high
      - urgent
      type: string
      description: |-
        * `low` - Low
        * `normal` - Normal
        * `high` - High
        * `urgent` - Urgent
    AdminTaskStatusEnum:
      enum:
      - open
      - in_progress
      - waiting
      - resolved
      - cancelled
      type: string
      description: |-
        * `open` - Open
        * `in_progress` - In progress
        * `waiting` - Waiting
        * `resolved` - Resolved
        * `cancelled` - Cancelled
    AdminTaskTypeEnum:
      enum:
      - kyc_manual_review
      - account_access_review
      - borrower_onboarding
      - loan_setup
      - payment_reconciliation
      - fx_settlement
      - document_review
      - email_delivery_failure
      - reporting
      - support
      - other
      type: string
      description: |-
        * `kyc_manual_review` - KYC manual review
        * `account_access_review` - Account access review
        * `borrower_onboarding` - Borrower onboarding
        * `loan_setup` - Loan setup
        * `payment_reconciliation` - Payment reconciliation
        * `fx_settlement` - FX settlement
        * `document_review` - Document review
        * `email_delivery_failure` - Email delivery failure
        * `reporting` - Reporting
        * `support` - Support
        * `other` - Other
    AdminUserCreateRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
          minLength: 1
        full_name:
          type: string
          maxLength: 255
      required:
      - email
      - full_name
      - password
    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        occurred_at:
          type: string
          format: date-time
        actor_type:
          type: string
        actor_id:
          type: string
        action:
          type: string
        target_type:
          type: string
        target_id:
          type: string
        request_id:
          type: string
        metadata: {}
      required:
      - action
      - actor_id
      - actor_type
      - id
      - metadata
      - occurred_at
      - request_id
      - target_id
      - target_type
    AuthenticatedUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
      required:
      - user
    DecisionEnum:
      enum:
      - approve
      - decline
      - request_reverification
      - reopen
      type: string
      description: |-
        * `approve` - Approve
        * `decline` - Decline
        * `request_reverification` - Request re-verification
        * `reopen` - Reopen manual review
    DiditWebhookResponse:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/KycStatusEnum'
        idempotent:
          type: boolean
      required:
      - idempotent
      - status
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        platform:
          type: string
        operator:
          type: string
        timezone:
          type: string
        environment:
          type: string
      required:
      - environment
      - operator
      - platform
      - status
      - timezone
    KycAdminCase:
      type: object
      properties:
        id:
          type: string
          format: uuid
        subject_type:
          type: string
        subject_reference:
          type: string
        user_id:
          type: string
          format: uuid
          nullable: true
        provider:
          type: string
        provider_environment:
          type: string
        workflow_id:
          type: string
        status:
          type: string
        manual_review_required:
          type: boolean
        blocking_reason:
          type: string
        risk_classification:
          type: string
        detected_flags:
          type: array
          items:
            type: string
        provider_session_id:
          type: string
        provider_verification_id:
          type: string
        provider_report_id:
          type: string
        aml_screening_id:
          type: string
        provider_subject_id:
          type: string
        decision_at:
