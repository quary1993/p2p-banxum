components:
  schemas:
    AccountAccessChangeRequest:
      type: object
      properties:
        new_status:
          $ref: '#/components/schemas/NewStatusEnum'
        reason_code:
          $ref: '#/components/schemas/AccountAccessChangeRequestReasonCodeEnum'
        note:
          type: string
        evidence_summary:
          type: string
        clean_account_confirmed:
          type: boolean
          default: false
      required:
      - new_status
      - reason_code
    AccountAccessChangeRequestReasonCodeEnum:
      enum:
      - kyc_aml_review
      - compliance_hold
      - email_recovery
      - support_request
      - account_closure
      - admin_correction
      - other
      type: string
      description: |-
        * `kyc_aml_review` - KYC/AML review
        * `compliance_hold` - Compliance hold
        * `email_recovery` - Email recovery
        * `support_request` - Support request
        * `account_closure` - Account closure
        * `admin_correction` - Admin correction
        * `other` - Other
    AccountAccessChangeResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        event:
          $ref: '#/components/schemas/AccountAccessEvent'
      required:
      - event
      - user
    AccountAccessEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        actor_user_id:
          type: string
          format: uuid
        actor_account_type:
          type: string
        previous_status:
          type: string
        new_status:
          type: string
        previous_is_active:
          type: boolean
        new_is_active:
          type: boolean
        reason_code:
          type: string
        note:
          type: string
        evidence_summary:
          type: string
        clean_account_confirmed:
          type: boolean
        changed_at:
          type: string
          format: date-time
      required:
      - actor_account_type
      - actor_user_id
      - changed_at
      - clean_account_confirmed
      - evidence_summary
      - id
      - new_is_active
      - new_status
      - note
      - previous_is_active
      - previous_status
      - reason_code
      - user_id
    AdminLoginConfirmRequest:
      type: object
      properties:
        code_id:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^\d{6}$
      required:
      - code
      - code_id
    AdminLoginStartRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          writeOnly: true
      required:
      - email
      - password
    AdminLoginStartResponse:
      type: object
      properties:
        code_id:
          type: string
          format: uuid
        status:
          type: string
        expires_at:
          type: string
          format: date-time
      required:
      - code_id
      - expires_at
      - status
    AdminTask:
      type: object
      properties:
        id:
          type: string
          format: uuid
        task_type:
          type: string
        title:
          type: string
        priority:
          type: string
        status:
          type: string
        assigned_admin_id:
          type: string
          format: uuid
          nullable: true
        created_by_id:
          type: string
          format: uuid
        due_at:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
        related_object_type:
          type: string
        related_object_id:
          type: string
        completed_at:
          type: string
          format: date-time
          nullable: true
        completion_note:
          type: string
        is_terminal:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
