name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: banxum
          POSTGRES_USER: banxum
          POSTGRES_PASSWORD: banxum
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U banxum -d banxum"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://banxum:banxum@localhost:5432/banxum
      MIGRATION_CHECK_DATABASE_URL: postgres://banxum:banxum@localhost:5432/banxum
      POSTGRES_TEST_DATABASE_URL: postgres://banxum:banxum@localhost:5432/banxum
      REDIS_URL: redis://localhost:6379/0
      CACHE_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: unsafe-ci-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --python 3.12 --group dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Agent handoff checks
        run: make agent-check

      - name: Postgres hardening tests
        run: make test-postgres-hardening

      - name: Frontend dependency audit
        run: npm --prefix frontend audit --omit=optional

      - name: Docker build
        run: make docker-build
