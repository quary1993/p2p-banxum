openapi: 3.0.3
info:
  title: BANXUM API
  version: 0.1.0
  description: Internal API for BANXUM investor and admin portals.
paths:
  /api/v1/auth/magic-link/consume/:
    post:
      operationId: v1_auth_magic_link_consume_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/magic-link/request/:
    post:
      operationId: v1_auth_magic_link_request_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
        required: true
      responses:
        '202':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/phone/confirm/:
    post:
      operationId: v1_auth_phone_confirm_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationConfirmResponse'
          description: ''
  /api/v1/auth/phone/request/:
    post:
      operationId: v1_auth_phone_request_create
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationRequestResponse'
          description: ''
  /api/v1/auth/register/natural-person/:
    post:
      operationId: v1_auth_register_natural_person_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NaturalPersonRegistrationResponse'
          description: ''
  /api/v1/health/:
    get:
      operationId: v1_health_retrieve
      tags:
      - v1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
          description: ''
components:
  schemas:
    AuthenticatedUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
      required:
      - user
    HealthResponse:
      type: object
      properties:
        status:
          type: string
        platform:
          type: string
        operator:
          type: string
        timezone:
          type: string
        environment:
          type: string
      required:
      - environment
      - operator
      - platform
      - status
      - timezone
    MagicLinkConsume:
      type: object
      properties:
        token:
          type: string
      required:
      - token
    MagicLinkRequest:
      type: object
      properties:
        email:
          type: string
          format: email
      required:
      - email
    NaturalPersonRegistrationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        full_name:
          type: string
          maxLength: 255
        phone_number:
          type: string
          maxLength: 32
        terms_version:
          type: string
          maxLength: 64
        terms_hash:
          type: string
          maxLength: 128
        marketing_consent:
          type: boolean
          default: false
      required:
      - email
      - full_name
      - phone_number
      - terms_hash
      - terms_version
    NaturalPersonRegistrationResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
      required:
      - user
    PhoneVerificationConfirmRequest:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
        code:
          type: string
          pattern: ^\d{6}$
      required:
      - challenge_id
      - code
    PhoneVerificationConfirmResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
      required:
      - user
    PhoneVerificationRequestResponse:
      type: object
      properties:
        challenge_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
        phone_verified:
          type: boolean
      required:
      - challenge_id
      - expires_at
      - phone_verified
      - status
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
        account_type:
          type: string
        status:
          type: string
        phone_verified:
          type: boolean
        marketing_consent:
          type: boolean
      required:
      - account_type
      - email
      - full_name
      - id
      - marketing_consent
      - phone_verified
      - status
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
