openapi: 3.0.3
info:
  title: BANXUM API
  version: 0.1.0
  description: Internal API for BANXUM investor and admin portals.
paths:
  /api/v1/admin-ops/audit-events/:
    get:
      operationId: v1_admin_ops_audit_events_list
      parameters:
      - in: query
        name: action
        schema:
          type: string
          maxLength: 128
      - in: query
        name: actor_id
        schema:
          type: string
          maxLength: 128
      - in: query
        name: actor_type
        schema:
          type: string
          maxLength: 64
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 250
          minimum: 1
          default: 100
      - in: query
        name: occurred_from
        schema:
          type: string
          format: date-time
      - in: query
        name: occurred_to
        schema:
          type: string
          format: date-time
      - in: query
        name: target_id
        schema:
          type: string
          maxLength: 128
      - in: query
        name: target_type
        schema:
          type: string
          maxLength: 128
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditEvent'
          description: ''
  /api/v1/admin-ops/tasks/:
    get:
      operationId: v1_admin_ops_tasks_list
      parameters:
      - in: query
        name: assigned_admin_id
        schema:
          type: string
          format: uuid
      - in: query
        name: due_after
        schema:
          type: string
          format: date-time
      - in: query
        name: due_before
        schema:
          type: string
          format: date-time
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 250
          minimum: 1
          default: 100
      - in: query
        name: priority
        schema:
          enum:
          - low
          - normal
          - high
          - urgent
          type: string
          minLength: 1
        description: |-
          * `low` - Low
          * `normal` - Normal
          * `high` - High
          * `urgent` - Urgent
      - in: query
        name: related_object_id
        schema:
          type: string
          maxLength: 128
      - in: query
        name: related_object_type
        schema:
          type: string
          maxLength: 128
      - in: query
        name: status
        schema:
          enum:
          - open
          - in_progress
          - waiting
          - resolved
          - cancelled
          type: string
          minLength: 1
        description: |-
          * `open` - Open
          * `in_progress` - In progress
          * `waiting` - Waiting
          * `resolved` - Resolved
          * `cancelled` - Cancelled
      - in: query
        name: task_type
        schema:
          enum:
          - kyc_manual_review
          - account_access_review
          - borrower_onboarding
          - loan_setup
          - payment_reconciliation
          - fx_settlement
          - document_review
          - email_delivery_failure
          - reporting
          - support
          - other
          type: string
          minLength: 1
        description: |-
          * `kyc_manual_review` - KYC manual review
          * `account_access_review` - Account access review
          * `borrower_onboarding` - Borrower onboarding
          * `loan_setup` - Loan setup
          * `payment_reconciliation` - Payment reconciliation
          * `fx_settlement` - FX settlement
          * `document_review` - Document review
          * `email_delivery_failure` - Email delivery failure
          * `reporting` - Reporting
          * `support` - Support
          * `other` - Other
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminTask'
          description: ''
    post:
      operationId: v1_admin_ops_tasks_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminTaskCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminTaskCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminTaskCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTask'
          description: ''
  /api/v1/admin-ops/tasks/{task_id}/:
    get:
      operationId: v1_admin_ops_tasks_retrieve
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTask'
          description: ''
    patch:
      operationId: v1_admin_ops_tasks_partial_update
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedAdminTaskUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedAdminTaskUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedAdminTaskUpdateRequest'
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTask'
          description: ''
  /api/v1/admin-ops/tasks/{task_id}/events/:
    get:
      operationId: v1_admin_ops_tasks_events_list
      parameters:
      - in: path
        name: task_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdminTaskEvent'
          description: ''
  /api/v1/auth/admin/login/confirm/:
    post:
      operationId: v1_auth_admin_login_confirm_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminLoginConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminLoginConfirmRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/admin/login/start/:
    post:
      operationId: v1_auth_admin_login_start_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginStartRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminLoginStartRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminLoginStartRequest'
        required: true
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminLoginStartResponse'
          description: ''
  /api/v1/auth/admin/users/:
    post:
      operationId: v1_auth_admin_users_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AdminUserCreateRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/admin/users/{user_id}/access/:
    post:
      operationId: v1_auth_admin_users_access_create
      parameters:
      - in: path
        name: user_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountAccessChangeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/AccountAccessChangeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AccountAccessChangeRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountAccessChangeResponse'
          description: ''
  /api/v1/auth/magic-link/consume/:
    post:
      operationId: v1_auth_magic_link_consume_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkConsume'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/magic-link/request/:
    post:
      operationId: v1_auth_magic_link_request_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
        required: true
      responses:
        '202':
          description: No response body
  /api/v1/auth/me/:
    get:
      operationId: v1_auth_me_retrieve
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUserResponse'
          description: ''
  /api/v1/auth/phone/confirm/:
    post:
      operationId: v1_auth_phone_confirm_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PhoneVerificationConfirmRequest'
        required: true
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationConfirmResponse'
          description: ''
  /api/v1/auth/phone/request/:
    post:
      operationId: v1_auth_phone_request_create
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneVerificationRequestResponse'
          description: ''
  /api/v1/auth/register/natural-person/:
    post:
      operationId: v1_auth_register_natural_person_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/NaturalPersonRegistrationRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NaturalPersonRegistrationResponse'
