      - completed_at
      - completion_note
      - created_at
      - created_by_id
      - due_at
      - id
      - is_terminal
      - notes
      - priority
      - related_object_id
      - related_object_type
      - status
      - task_type
      - title
      - updated_at
    AdminTaskCreateRequest:
      type: object
      properties:
        task_type:
          $ref: '#/components/schemas/AdminTaskTypeEnum'
        title:
          type: string
          maxLength: 255
        priority:
          allOf:
          - $ref: '#/components/schemas/AdminTaskPriorityEnum'
          default: normal
        assigned_admin_id:
          type: string
          format: uuid
          nullable: true
        due_at:
          type: string
          format: date-time
          nullable: true
        notes:
