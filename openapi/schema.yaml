  /api/v1/loans/admin/loans/:
    get:
      operationId: v1_loans_admin_loans_list
      parameters:
      - in: query
        name: borrower_id
        schema:
          type: string
          format: uuid
      - in: query
        name: currency
        schema:
          type: string
          maxLength: 3
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 250
          minimum: 1
          default: 100
      - in: query
        name: purpose
        schema:
          enum:
          - working_capital
          - liquidity
          - refinancing
          - debt_consolidation
          - acquisition
          - bridge_financing
          - project_finance
          - corporate_project_finance
          - capex
          - development
          - inventory_trade_finance
          - other
          type: string
          minLength: 1
        description: |-
          * `working_capital` - Working capital
          * `liquidity` - Liquidity
          * `refinancing` - Refinancing
          * `debt_consolidation` - Debt consolidation
          * `acquisition` - Acquisition
          * `bridge_financing` - Bridge financing
          * `project_finance` - Project finance
          * `corporate_project_finance` - Corporate project finance
          * `capex` - Capex / business expansion
          * `development` - Development
          * `inventory_trade_finance` - Inventory or trade finance
          * `other` - Other
      - in: query
        name: q
        schema:
          type: string
          maxLength: 255
      - in: query
        name: repayment_type
        schema:
          enum:
          - equal_installments
          - bullet_periodic_interest
          - amortizing_principal_interest
          - interest_only_then_bullet
          - interest_only_then_amortizing
          type: string
          minLength: 1
        description: |-
          * `equal_installments` - Equal installments
          * `bullet_periodic_interest` - Bullet principal with periodic interest
          * `amortizing_principal_interest` - Amortizing principal and interest
          * `interest_only_then_bullet` - Interest-only then bullet
          * `interest_only_then_amortizing` - Interest-only then amortizing
      - in: query
        name: risk_rating
        schema:
          enum:
          - AAA
          - AA+
          - AA
          - AA-
          - A+
          - A
          - A-
          - BBB+
          - BBB
          - BBB-
          - BB+
          - BB
          - BB-
          - B+
          - B
          - B-
          - CCC
          - CC
          - C
          - D
          - unrated
          type: string
          minLength: 1
        description: |-
          * `AAA` - AAA
          * `AA+` - AA+
          * `AA` - AA
          * `AA-` - AA-
          * `A+` - A+
          * `A` - A
          * `A-` - A-
          * `BBB+` - BBB+
          * `BBB` - BBB
          * `BBB-` - BBB-
          * `BB+` - BB+
          * `BB` - BB
          * `BB-` - BB-
          * `B+` - B+
          * `B` - B
          * `B-` - B-
          * `CCC` - CCC
          * `CC` - CC
          * `C` - C
          * `D` - D
          * `unrated` - Unrated
      - in: query
        name: status
        schema:
          enum:
          - draft
          - published
          - funded
          - late
          - defaulted
          - repaid
          - written_off
          - cancelled
          type: string
          minLength: 1
        description: |-
          * `draft` - Draft
          * `published` - Published
          * `funded` - Funded
          * `late` - Late
          * `defaulted` - Defaulted
          * `repaid` - Repaid
          * `written_off` - Written off
          * `cancelled` - Cancelled
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Loan'
          description: ''
    post:
      operationId: v1_loans_admin_loans_create
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoanCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoanCreateRequest'
          multipart/form-data:
            schema:
